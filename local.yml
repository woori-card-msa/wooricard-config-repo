spring:
  application:
    name: [각자 서비스 이름으로 변경]
    
  profiles:
    active: dev # 현재 활성화할 프로파일

  config:
    import: "optional:configserver:http://192.168.1.80:8888" # Config Server 주소
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: [각자 서비스 포트번호로 변경]
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true  
 
# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true # 디버깅 시 true로 설정 
    doc-expansion: none

# 로깅 레벨 설정
logging:
  level:
    com.card.payment: DEBUG

